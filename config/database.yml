development:
  adapter: postgresql
  host: localhost
  database: solar_hub_dev
  username: <%= ENV.fetch("DB_USERNAME") { "alexmoore" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "" } %>
  pool: 40
  timeout: 5000

staging:
  adapter: postgresql
  host: localhost
  database: solar_hub_dev
  username: postgres
